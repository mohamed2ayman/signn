version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: sign-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sign_user
      POSTGRES_PASSWORD: sign_password
      POSTGRES_DB: sign_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sign_user -d sign_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sign-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sign-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      # Phase 4.2 — dev-only fallback so docker users don't break on pull.
      # .env.example documents JWT_REFRESH_SECRET as required (Joi.required()).
      # The real value should be set in ./backend/.env for production-like runs.
      # This default is ONLY for local development.
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-only-refresh-secret-minimum-32-chars-please-change}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-backend:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    container_name: sign-ai-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./ai-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-backend:/app
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  celery-worker:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    container_name: sign-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --concurrency=3 --time-limit=2400 --soft-time-limit=1800
    env_file:
      - ./ai-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-backend:/app
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: apps/sign/Dockerfile
    container_name: sign-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    env_file:
      - ./apps/sign/.env
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/sign/node_modules

  managex:
    build:
      context: .
      dockerfile: apps/managex/Dockerfile
    container_name: sign-managex
    restart: unless-stopped
    ports:
      - '5175:5175'
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/managex/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads_data:
