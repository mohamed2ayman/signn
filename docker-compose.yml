version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: sign-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sign_user
      POSTGRES_PASSWORD: sign_password
      POSTGRES_DB: sign_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sign_user -d sign_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sign-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sign-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads

  ai-backend:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    container_name: sign-ai-backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - ./ai-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sign-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads_data:
