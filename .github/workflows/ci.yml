name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — NestJS backend unit tests (Jest)
  # No services needed — all tests use TestingModule isolation.
  # ─────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      # Option B tenancy gate — the ENFORCING no-bare-contract-repo-access rule.
      # Isolated config (--no-eslintrc): this runs ONLY the contract-repo rule,
      # NOT the project's general lint (which has no config + a dangerous --fix).
      # Fails the build (exit 1) on any new bare contract-scoped repo access that
      # is not annotated `// lint-exempt: <reason>`. Runs before tests so a
      # tenancy regression fails fast. See CLAUDE.md "Contract-Scoped Repository
      # Access" Architecture Rule and docs/option-b-lint-phase1-inventory.md.
      - name: Contract-repo tenancy lint (Option B chokepoint gate)
        working-directory: backend
        run: npm run lint:contract-repo

      - name: Run tests
        working-directory: backend
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — SIGN frontend unit tests (Vitest + React Testing Library)
  # Must install from workspace root because apps/sign depends on
  # @managex/tokens via npm workspaces — cd apps/sign && npm ci would fail.
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (SIGN)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run SIGN frontend tests
        run: npm -w @managex/sign run test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — AI backend unit tests (pytest)
  # System packages are required before pip install:
  #   - tesseract-ocr / tesseract-ocr-ara  → pytesseract
  #   - poppler-utils                       → pdf2image
  #   - libpq-dev                           → psycopg2-binary headers
  # No env vars needed — Anthropic/DB/Redis are all mocked in tests.
  # ─────────────────────────────────────────────────────────────────────────────
  ai-backend-tests:
    name: AI Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-backend/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ara poppler-utils libpq-dev

      - name: Install Python dependencies
        working-directory: ai-backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: ai-backend
        run: python -m pytest tests/ -v
